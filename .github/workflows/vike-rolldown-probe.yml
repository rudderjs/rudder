# Diagnostic capture for rolldown/rolldown#9592 (manual, workflow_dispatch only).
#
# The "__VITE_ASSETS_MANIFEST__ left unreplaced" bug reproduces on Linux under a
# CONCURRENT, uncached build of several Vike apps (~1/28 at baseline, higher under
# load). This workflow loops that concurrent app build with the non-suppressing
# build-topology probe enabled (DIAG_ASSETS_MANIFEST=1, see
# playground{,-web}/vite-diag-assets-manifest.ts) and, on any iteration that
# leaks the placeholder, dumps the [DIAG] timeline + the leaking files so we can
# answer the maintainer's question: which rolldown pass / outDir owns the leaked
# chunk relative to the pass whose set_macro ran.
#
# By default (stock_vike=true) the run drops our FS-crawl patch so the leak can
# actually surface; set stock_vike=false to keep the patch and capture only the
# per-pass timeline (disk always repaired, so leaks stay 0).
name: Vike Rolldown Probe

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of full cold builds (packages + all 4 apps) to run; each ~3 min'
        required: false
        default: '20'
      stock_vike:
        description: 'Disable our FS-crawl patch so the leak can surface (true), or keep it (false, timeline only)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  probe:
    name: Concurrent build probe (rolldown#9592)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run STOCK vike (drop our FS-crawl patch) so set_macro's in-memory lookup
      # can miss the chunk and the placeholder survives to disk for the probe to
      # catch. Skipped when stock_vike=false (then the loop captures the per-pass
      # timeline only, with the disk always repaired).
      - name: Use stock vike (disable FS-crawl patch)
        if: ${{ github.event.inputs.stock_vike == 'true' }}
        run: |
          sed -i '/^patchedDependencies:/d; /vike@0\.4\.257: patches/d' pnpm-workspace.yaml
          pnpm install --no-frozen-lockfile
          echo "Stock vike in use — set_macro uses the upstream in-memory lookup."

      - name: Loop full cold builds with the probe
        env:
          DIAG_ASSETS_MANIFEST: '1'
        run: |
          mkdir -p "$RUNNER_TEMP/diag"
          N='${{ github.event.inputs.iterations }}'
          leaks=0
          for i in $(seq 1 "$N"); do
            # Faithful reproduction of the failing "Playground Build" job: a cold,
            # uncached build of the WHOLE graph (packages + all 4 apps) under full
            # turbo concurrency. That CPU contention is what the bug needs; a light
            # app-only build does not trigger it (0/30 in the first probe run).
            rm -rf playground*/dist node_modules/.cache/turbo
            log="$RUNNER_TEMP/diag/iter-$i.log"
            # --env-mode=loose so DIAG_ASSETS_MANIFEST reaches the vite task
            # subprocess; turbo's default strict mode strips undeclared env vars,
            # which silently disabled the probe in the previous heavy run.
            DIAG_ASSETS_MANIFEST=1 pnpm turbo run build --force --concurrency=100% --env-mode=loose > "$log" 2>&1 || true

            # Verify the apps actually built (guard against a masked build failure
            # producing a false "no leak"). Count emitted server JS across apps.
            srv=$(find playground*/dist/server -name '*.js' 2>/dev/null | wc -l | tr -d ' ')
            diag=$(grep -c '\[DIAG\]' "$log" 2>/dev/null || echo 0)
            echo "iter $i: serverJsFiles=$srv diagLines=$diag" >> "$RUNNER_TEMP/diag/_summary.txt"

            if grep -rl '__VITE_ASSETS_MANIFEST__' playground*/dist/server 2>/dev/null; then
              leaks=$((leaks + 1))
              echo "::warning::iteration $i LEAKED __VITE_ASSETS_MANIFEST__"
              cp "$log" "$RUNNER_TEMP/diag/LEAK-iter-$i.log"
              echo "===== [DIAG] timeline for leaking iteration $i ====="
              grep '\[DIAG\]' "$log" || true
              echo "===== leaking files ====="
              grep -rl '__VITE_ASSETS_MANIFEST__' playground*/dist/server || true
            else
              # Keep just the DIAG lines from clean runs to bound artifact size.
              grep '\[DIAG\]' "$log" > "$RUNNER_TEMP/diag/iter-$i.diag" 2>/dev/null || true
              rm -f "$log"
            fi
          done
          echo "=== per-iteration build verification ==="; cat "$RUNNER_TEMP/diag/_summary.txt"
          echo "=============================================="
          echo "  $leaks / $N iterations leaked the placeholder"
          echo "=============================================="
          {
            echo "### Vike rolldown probe"
            echo ""
            echo "**$leaks / $N** iterations leaked \`__VITE_ASSETS_MANIFEST__\`."
            echo ""
            echo "Full [DIAG] timelines in the \`vike-rolldown-probe-logs\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload probe logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vike-rolldown-probe-logs
          path: ${{ runner.temp }}/diag
          if-no-files-found: ignore
