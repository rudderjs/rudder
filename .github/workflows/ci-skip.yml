# Docs-only CI sibling. Fires when the real CI workflow's `paths-ignore` filters
# it out — reports the required status checks so branch protection stays
# satisfied without booting the full package build + test pipeline.
#
# `Build & Test` still runs the docs site build so VitePress/Vue-parser
# breakage in plan docs (e.g. unescaped `<2%`, `Promise<T>` patterns) gets
# caught at PR time instead of slipping into the Version & Publish workflow.
#
# Job names here MUST match ci.yml exactly (`Lint`, `Build & Test`) — the
# branch protection ruleset matches checks by name.
name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/CODEOWNERS'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "Docs-only change — skipping lint."

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm --filter @rudderjs/docs build
