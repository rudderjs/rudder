name: auto-fix

# On-demand fix-bot: runs Claude Code headless as the Rudder Bot GitHub App to fix ONE
# issue and open a PR for review. Logic lives in .github/auto-fix-prompt.md. Never auto-merges.
#
# Scope: a MANUAL trigger (label or dispatch) may target ANY issue of any dimension; the bot
# stays disciplined (smallest change, tests must pass, defers if it can't do it cleanly). The
# daily auto-pick scheduler only ever feeds it mechanical/safe issues (docs/tests/quality), so
# autonomous runs never touch security/behavior code unprompted.
#
# Two ways to start it:
#   - Add the `bot:fix` label to an issue (easy path: it fires automatically on that issue).
#   - Actions > auto-fix > Run workflow, passing the issue number (manual fallback).
#
# Prerequisite: the Rudder Bot app needs Contents: Read & write and Pull requests: Read & write
# (in addition to Issues: Read & write), with the new permissions accepted on the installation.

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to fix (e.g. 1224)"
        required: true
        type: string
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: auto-fix-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fix:
    # Manual dispatch always runs; the label trigger runs ONLY for the `bot:fix` label.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'bot:fix' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue || github.event.issue.number }}
    steps:
      # Mint the bot token BEFORE checkout so the checkout (and thus git push) uses it,
      # making the branch + commits + PR all authored by Rudder Bot.
      - name: Mint Rudder Bot token
        id: bot
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RUDDER_BOT_APP_ID }}
          private-key: ${{ secrets.RUDDER_BOT_PRIVATE_KEY }}

      - name: Checkout (as Rudder Bot)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.bot.outputs.token }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure bot git identity
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          slug="${{ steps.bot.outputs.app-slug }}"
          uid=$(gh api "/users/${slug}[bot]" --jq '.id')
          git config --global user.name "${slug}[bot]"
          git config --global user.email "${uid}+${slug}[bot]@users.noreply.github.com"
          echo "Committing as ${slug}[bot] <${uid}+${slug}[bot]@users.noreply.github.com>"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run fix-bot
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          # ISSUE_NUMBER comes from job-level env (handles both dispatch and label triggers).
        run: |
          claude -p "$(cat .github/auto-fix-prompt.md)" \
            --allowedTools "Bash,Read,Grep,Glob,Edit,Write,Task,WebSearch,WebFetch" \
            --permission-mode bypassPermissions \
            --max-turns 150 \
            --model claude-sonnet-4-6 \
            --verbose
