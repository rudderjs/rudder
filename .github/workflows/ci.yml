# Consolidated CI workflow.
#
# Previously the repo had ci.yml + ci-skip.yml — two workflows sharing the
# same `name: CI` and identical job names, with mutually-exclusive `paths` /
# `paths-ignore` filters meant to keep branch-protection check names firing
# on docs-only PRs without running the full pipeline. The filter pair
# wasn't truly exclusive though: any PR mixing code + markdown (every PR
# with a changeset) tripped BOTH workflows, doubling CI minutes.
#
# This file collapses them into one. The workflow always triggers on
# main/PR; a leading `changes` job detects whether any non-docs file
# changed, and heavy jobs (lint, build-test matrix, scaffolder-e2e) skip
# themselves on docs-only PRs via job-level `if:`. GitHub treats a skipped
# required check as a passing check for branch protection, so docs-only PRs
# stay mergeable without a parallel mirror workflow.
#
# Adding a new required check: add the job + an `if:` referencing
# `needs.changes.outputs.code`. Don't introduce a second workflow file.
#
# Windows coverage: the `build-test` matrix is ubuntu-only on PRs/pushes and
# gains the windows-latest leg ONLY on the nightly `schedule`. The Windows
# runner's flakes are environmental (DLL-init crashes, native-addon teardown
# races) and share exit code 1 with real failures, so they can't be reliably
# auto-classified — keeping Windows off the PR matrix means a flake never reds a
# PR, while the nightly run still surfaces genuine Windows regressions on main.
# The `os` matrix is computed in the `changes` job from `github.event_name`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly run on main — the ONLY time the Windows leg of build-test runs.
  # Keeping Windows off the per-PR / per-push matrix means its environmental
  # flake (native DLL-init crash, libsql/native teardown races) can never red a
  # PR; real Windows regressions surface here once a day instead, in one place.
  schedule:
    - cron: '0 7 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every job here only checks out, installs, builds, and tests — none push,
# comment, or write. Pin the GITHUB_TOKEN to least privilege at the workflow
# level (applies to all jobs); raise per-job only if a future job needs more.
permissions:
  contents: read

# Turbo's first-run telemetry notice can make `turbo run` exit non-zero on a
# fresh runner even when every task succeeded (one of the Windows build-flake
# sources). Opt out everywhere so that class never appears.
env:
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code }}
      # OS matrix for build-test: ubuntu-only on PR/push (Windows can't red a
      # PR), ubuntu + windows on the nightly schedule.
      os: ${{ steps.osmatrix.outputs.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: osmatrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'os=["ubuntu-latest","windows-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi
      - id: filter
        # paths-filter needs a diff base; a `schedule` event has none. Skip it
        # there — the nightly always runs build-test (gated on event_name below).
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # `code` is true when ANY changed file is NOT in the docs/meta
          # set. Inverse-match (`!`) lets paths-filter express the
          # "non-docs touched" predicate that `paths-ignore` couldn't.
          filters: |
            code:
              - '!**/*.md'
              - '!**/*.mdx'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/CODEOWNERS'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  build-test:
    name: Build & Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: changes
    # Runs on a code PR/push (ubuntu legs — the required gate) and on the nightly
    # schedule (ubuntu + windows legs). The Windows leg therefore never appears
    # on a PR, so its environmental flake can't block a merge.
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule'
    runs-on: ${{ matrix.os }}
    # Healthy runs are ~6-8m; the Windows wrapper's worst case (1 × 6m attempt
    # + kill + log flush) concludes well under 10m. 15m is the backstop for
    # anything that still slips past the per-attempt timeout — bounded, instead
    # of the old 40m grind.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-only on PR/push; ubuntu + windows on the nightly schedule
        # (computed in the `changes` job).
        os: ${{ fromJSON(needs.changes.outputs.os) }}
        # Active LTS lines only — Node 20 ("Iron") reached EOL April 2026.
        # Odd-numbered lines (21/23/25) are never LTS and are intentionally skipped.
        node-version: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-

      # ── Windows-only build-flake mitigation (layered) ────────────────────
      # `Build & Test (windows-latest)` has TWO distinct intermittent failure
      # modes (don't conflate them — that's why earlier single-cause fixes kept
      # recurring):
      #
      #   A. CRASH — a spawned `tsc` / `node --test` exits -1073741502 ==
      #      0xC0000142 == STATUS_DLL_INIT_FAILED: the process dies during DLL
      #      init under Windows desktop-heap exhaustion (many process spawns).
      #      Fails FAST (a few minutes), non-zero exit.
      #   B. HANG — a spawned process instead WEDGES and never returns. The job
      #      ran to its timeout and was cancelled (~25m). (NOT the turbo daemon:
      #      turbo 2.x doesn't use it for `turbo run`.) Root cause unconfirmed —
      #      a wedged build/test process under the same pressure.
      #
      # Both never reproduce on Linux/macOS and clear on re-run. Defences:
      #   1. Add-MpPreference exclusion — Defender scanning a DLL mid-load can
      #      aggravate the init failure. Best-effort; never fails CI.
      #   2. TURBO_CONCURRENCY=1 — serialise so only one process spawns at a time
      #      (#784). Default on Linux. Cuts the crash rate, but not to zero.
      #   3. TURBO_LOG_ORDER=stream — keep failures attributable, not swallowed.
      #   4. SINGLE attempt (was bounded retry #792/#798, then 2 attempts #828):
      #      the flake is sticky to the runner, so in-job retries re-hit the
      #      exhausted heap and mostly just doubled the grind. One attempt +
      #      the flake-signature exit-0 (#815) gets to a non-blocking green in
      #      ~7m worst case; re-run the job on a FRESH runner to genuinely clear.
      #   5. PER-ATTEMPT TIMEOUT — handles mode B, which exit-code checks are
      #      structurally blind to: a process that never exits blocks the loop
      #      until the job timeout. Each attempt runs in a child pwsh we kill
      #      (whole tree) if it exceeds 6m (healthy is ~3m). On timeout we dump
      #      the live node/pnpm/turbo/tsc processes for diagnosability.
      #   6. REDIRECTED ATTEMPT OUTPUT + STRAY SWEEP — why the self-heal never
      #      visibly worked before (jobs "always stuck" until cancelled): the
      #      attempt child shared the step's console, and orphaned grandchildren
      #      surviving the tree-kill (esbuild service, turbo children) inherited
      #      the step's stdout pipe. The Actions runner does not complete a step
      #      until that pipe closes, so the wrapper's `exit 0` landed into a
      #      step that hung anyway. Attempts now write to RUNNER_TEMP files
      #      (orphans hold file handles, not the runner pipe; output is printed
      #      after the attempt), and every exit path force-stops stray
      #      node/esbuild/turbo/tsc processes so a wedged Build can't poison
      #      the Test step on the same runner.
      #
      # A REAL failure (a failing test exits 1 — not a flake signature) still
      # goes red; the flake-only exit-0 cannot mask it.
      - name: Exclude workspace from Windows Defender
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction Stop
            Write-Host "Defender exclusion added for ${{ github.workspace }}"
          } catch {
            Write-Host "::warning::Could not add Defender exclusion (continuing): $_"
          }

      # Linux/macOS: plain steps, no retry — the flake never reproduces here.
      - name: Build
        if: matrix.os != 'windows-latest'
        run: pnpm turbo run build --filter='./packages/*' --filter='./create-rudder'

      - name: Test
        if: matrix.os != 'windows-latest'
        run: pnpm turbo run test --filter='./packages/*' --filter='./create-rudder'

      # Windows: serialise + stream + retry up to 2x, with a PER-ATTEMPT TIMEOUT.
      # Each attempt runs the turbo command in a child pwsh we wait on with a
      # deadline (WaitForExit) and kill (whole process tree) if it wedges — so a
      # crash (mode A, fast non-zero exit) AND a hang (mode B, no exit) both route
      # into the same backoff+retry. On timeout we dump the live build processes
      # for diagnostics. A real failure fails both attempts and still goes red.
      # (Inlined per step rather than shared — self-contained plain pwsh is easier
      # to read and reason about than an interpolated function.)
      - name: Build (windows — retry + per-attempt timeout for the DLL crash/hang flakes)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          TURBO_LOG_ORDER: stream
          TURBO_CONCURRENCY: '1'
        run: |
          $max = 1   # was 2 (#828): the flake is runner-sticky, in-job retries mostly doubled the grind
          $attemptTimeoutSec = 360   # 6m; healthy build is ~3m
          # Known Windows flake exit codes: 124 = our wedge-timeout (mode B);
          # -1073741502 / 3221225794 = 0xC0000142 STATUS_DLL_INIT_FAILED (mode A).
          # If EVERY failed attempt is one of these, it's the environmental flake
          # and we don't block (Ubuntu is the hard gate). Any OTHER non-zero code
          # (e.g. 1 = a real failing test) flips $allFlake off and still goes red.
          $flakeCodes = @(124, -1073741502, 3221225794)
          $allFlake = $true
          # Orphans surviving a tree-kill (esbuild service, turbo children) hold
          # handles that wedge the NEXT step on this runner — sweep them on every
          # exit path. (The step's own completion is protected by the output
          # redirection below, not by this sweep.)
          function Stop-StrayBuildProcs {
            Get-Process -Name node, esbuild, turbo, tsc, pnpm -ErrorAction SilentlyContinue |
              Stop-Process -Force -ErrorAction SilentlyContinue
          }
          foreach ($i in 1..$max) {
            # Run the attempt in a child pwsh so we can enforce a deadline and
            # kill a wedged process tree. The command line matches the Linux step.
            # Output goes to files, NOT the step console: orphaned grandchildren
            # that survive the tree-kill would otherwise inherit the step's
            # stdout pipe, and the Actions runner does not complete a step until
            # that pipe closes — the historical "exit 0 but the job hangs until
            # cancelled" failure. File handles don't pin the step.
            $out = Join-Path $env:RUNNER_TEMP "build-attempt-$i.out.log"
            $errf = Join-Path $env:RUNNER_TEMP "build-attempt-$i.err.log"
            $p = Start-Process pwsh -NoNewWindow -PassThru `
              -RedirectStandardOutput $out -RedirectStandardError $errf `
              -ArgumentList @(
                '-NoProfile','-Command',
                "pnpm turbo run build --filter='./packages/*' --filter='./create-rudder'; exit `$LASTEXITCODE"
              )
            $null = $p.Handle   # cache the handle so $p.ExitCode is readable after exit (pwsh Start-Process gotcha)
            if ($p.WaitForExit($attemptTimeoutSec * 1000)) {
              $code = $p.ExitCode
            } else {
              Write-Host "::warning::Build attempt $i/$max exceeded ${attemptTimeoutSec}s — a process wedged (hang flake, mode B)."
              # Diagnostic dump in a BOUNDED job — Get-Process against a
              # kernel-stuck zombie can itself hang, wedging this wrapper
              # exactly like the process it's reporting on. 10s or skip it.
              $dump = Start-Job { Get-Process | Where-Object { $_.ProcessName -match 'node|pnpm|turbo|tsc|esbuild' } |
                Select-Object Id, ProcessName, @{ n = 'RSS_MB'; e = { [int]($_.WorkingSet64 / 1MB) } } |
                Format-Table -AutoSize | Out-String }
              if (Wait-Job $dump -Timeout 10) { Receive-Job $dump | Write-Host } else { Write-Host "::warning::process dump itself timed out — zombie wedge" }
              Remove-Job $dump -Force -ErrorAction SilentlyContinue
              # taskkill /T /F is more reliable than .NET Kill($true) against a
              # wedged tree (kills by snapshot walk, not handle enumeration).
              try { & taskkill /PID $p.Id /T /F 2>$null | Out-Null } catch { Write-Host "::warning::taskkill failed: $_" }
              $p.WaitForExit(15000) | Out-Null
              $code = 124   # conventional timeout exit code
            }
            # Surface the attempt's redirected output in the step log.
            foreach ($f in @($out, $errf)) {
              if (Test-Path $f) { try { Get-Content $f | Write-Host } catch { Write-Host "::warning::could not read $f : $_" } }
            }
            if ($code -eq 0) { Stop-StrayBuildProcs; exit 0 }
            if ($flakeCodes -notcontains $code) { $allFlake = $false }
            if ($i -lt $max) {
              $delay = 30 * $i   # backoff before a retry — let the OS reclaim handles (mode A)
              Write-Host "::warning::Build attempt $i/$max failed (exit $code) — waiting ${delay}s, then retrying"
              Start-Sleep -Seconds $delay
            }
          }
          Stop-StrayBuildProcs
          if ($allFlake) {
            Write-Host "::warning::Windows build failed all $max attempt(s), but every failure matched a known Windows flake signature (DLL-init crash / wedge timeout; last code $code). Treating as NON-BLOCKING — Ubuntu remains the hard gate. Re-run this job to retry on a fresh runner."
            "⚠️ **Windows build** failed $max attempt(s), all flake signatures (last code $code) — non-blocking. Ubuntu is the gate." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }
          Write-Host "::error::Windows build failed after $max attempt(s) with a non-flake exit code ($code) — this is a real failure, not the environmental flake."
          exit 1

      - name: Test (windows — retry + per-attempt timeout for the DLL crash/hang flakes)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          TURBO_LOG_ORDER: stream
          TURBO_CONCURRENCY: '1'
        run: |
          $max = 1   # was 2 (#828): the flake is runner-sticky, in-job retries mostly doubled the grind
          $attemptTimeoutSec = 360   # 6m; healthy test is ~3m
          # See the Build step for the flake-code + output-redirection rationale.
          # Flake-only failures are non-blocking (Ubuntu gates); a real failing
          # test (exit 1) blocks.
          $flakeCodes = @(124, -1073741502, 3221225794)
          $allFlake = $true
          function Stop-StrayBuildProcs {
            Get-Process -Name node, esbuild, turbo, tsc, pnpm -ErrorAction SilentlyContinue |
              Stop-Process -Force -ErrorAction SilentlyContinue
          }
          foreach ($i in 1..$max) {
            $out = Join-Path $env:RUNNER_TEMP "test-attempt-$i.out.log"
            $errf = Join-Path $env:RUNNER_TEMP "test-attempt-$i.err.log"
            $p = Start-Process pwsh -NoNewWindow -PassThru `
              -RedirectStandardOutput $out -RedirectStandardError $errf `
              -ArgumentList @(
                '-NoProfile','-Command',
                "pnpm turbo run test --filter='./packages/*' --filter='./create-rudder'; exit `$LASTEXITCODE"
              )
            $null = $p.Handle   # cache the handle so $p.ExitCode is readable after exit (pwsh Start-Process gotcha)
            if ($p.WaitForExit($attemptTimeoutSec * 1000)) {
              $code = $p.ExitCode
            } else {
              Write-Host "::warning::Test attempt $i/$max exceeded ${attemptTimeoutSec}s — a process wedged (hang flake, mode B)."
              # Bounded dump + taskkill — see the Build step for rationale.
              $dump = Start-Job { Get-Process | Where-Object { $_.ProcessName -match 'node|pnpm|turbo|tsc|esbuild' } |
                Select-Object Id, ProcessName, @{ n = 'RSS_MB'; e = { [int]($_.WorkingSet64 / 1MB) } } |
                Format-Table -AutoSize | Out-String }
              if (Wait-Job $dump -Timeout 10) { Receive-Job $dump | Write-Host } else { Write-Host "::warning::process dump itself timed out — zombie wedge" }
              Remove-Job $dump -Force -ErrorAction SilentlyContinue
              try { & taskkill /PID $p.Id /T /F 2>$null | Out-Null } catch { Write-Host "::warning::taskkill failed: $_" }
              $p.WaitForExit(15000) | Out-Null
              $code = 124
            }
            foreach ($f in @($out, $errf)) {
              if (Test-Path $f) { try { Get-Content $f | Write-Host } catch { Write-Host "::warning::could not read $f : $_" } }
            }
            if ($code -eq 0) { Stop-StrayBuildProcs; exit 0 }
            if ($flakeCodes -notcontains $code) { $allFlake = $false }
            if ($i -lt $max) {
              $delay = 30 * $i
              Write-Host "::warning::Test attempt $i/$max failed (exit $code) — waiting ${delay}s, then retrying"
              Start-Sleep -Seconds $delay
            }
          }
          Stop-StrayBuildProcs
          if ($allFlake) {
            Write-Host "::warning::Windows tests failed all $max attempt(s), but every failure matched a known Windows flake signature (DLL-init crash / wedge timeout; last code $code). Treating as NON-BLOCKING — Ubuntu remains the hard gate. Re-run this job to retry on a fresh runner."
            "⚠️ **Windows tests** failed $max attempt(s), all flake signatures (last code $code) — non-blocking. Ubuntu is the gate." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }
          Write-Host "::error::Windows tests failed after $max attempt(s) with a non-flake exit code ($code) — this is a real failure, not the environmental flake."
          exit 1

  client-bundle:
    # Client-bundle smoke gate: some @rudderjs/* packages are legitimately
    # bundled into the BROWSER (a `Model` reachable from client code, `app`/`Env`
    # from a shared module). They must evaluate without pulling Node at module
    # eval — no top-level `process.env`, no static `node:` import in the graph.
    # Catches the orm 1.12.4 regression (`process is not defined`) and the
    # @rudderjs/core console/@clack re-export hostility. See
    # scripts/client-bundle-smoke.mjs.
    name: Client Bundle Smoke
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Client-bundle smoke
        run: pnpm test:client-bundle

  orm-standalone:
    # Standalone-Node certification: pack @rudderjs/orm the way npm ships it and
    # install it into a throwaway project OUTSIDE the workspace with NO Rudder
    # framework — proving it works as a plain library AND that no framework dep
    # (@rudderjs/console / @rudderjs/core) creeps into the install. The in-repo
    # conformance suite can't catch this — it runs where every @rudderjs/* package
    # is workspace-linked, so it never exercises the published exports map or the
    # real dependency graph. See scripts/orm-standalone-smoke.mjs.
    name: ORM Standalone Smoke
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Standalone install + round-trip
        run: node scripts/orm-standalone-smoke.mjs

  orm-pg:
    # Live Postgres conformance for the native ORM engine + the Drizzle and Prisma
    # adapters. The default build-test matrix runs SQLite only (in-memory better-sqlite3);
    # the pg round-trip tests (orm's drivers/postgres.test.ts + the relocated engine suites
    # in packages/database + orm-drizzle's PG-gated blocks + orm-prisma's pg-live suite)
    # skip themselves unless PG_TEST_URL is set. This job stands up a real Postgres
    # service and points the suite at it, so the pg dialect + driver are exercised
    # end-to-end in CI instead of only on a maintainer's machine. Linux-only —
    # GitHub service containers don't run on Windows runners (the matrix's Windows
    # leg keeps skipping the pg tests, which is fine; Ubuntu is the gate).
    name: ORM Postgres (live)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        # pgvector/pgvector = the official postgres image + the pgvector
        # extension preinstalled — needed by the vector live suites
        # (orm-drizzle/src/vector-live.test.ts runs CREATE EXTENSION vector
        # and skips itself when unavailable). Everything else is unchanged
        # stock postgres 16.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rudder
          POSTGRES_PASSWORD: rudder
          POSTGRES_DB: rudder_native_pg_test
        ports:
          - 5432:5432
        # Wait for the server to accept connections before the steps run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # PG_TEST_URL is declared in turbo.json's test `env`, so strict env mode
      # passes it through AND it's part of the cache key. `--force` stays as a
      # belt-and-braces guard; turbo builds the workspace deps first via `^build`.
      - name: ORM tests against live Postgres
        env:
          PG_TEST_URL: postgres://rudder:rudder@localhost:5432/rudder_native_pg_test
        run: pnpm turbo run test --filter @rudderjs/orm --filter @rudderjs/database --filter @rudderjs/orm-drizzle --filter @rudderjs/orm-prisma --force

  orm-mysql:
    # Live MySQL conformance for the native ORM engine + the Drizzle and Prisma adapters —
    # mirrors orm-pg. The default build-test matrix runs SQLite only; the mysql round-trip
    # tests (orm's drivers/mysql.test.ts + the relocated engine suites in packages/database
    # + orm-drizzle's MySQL-gated blocks, incl. the post-#882 mysql-writes regression suite,
    # + orm-prisma's mysql-live suite) skip themselves unless MYSQL_TEST_URL is set. This job stands up a real MySQL
    # service so the mysql dialect + driver (and the no-RETURNING write path) are
    # exercised end-to-end in CI. Linux-only — GitHub service containers don't run
    # on Windows runners.
    name: ORM MySQL (live)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rudder
          MYSQL_DATABASE: rudder_native_mysql_test
        ports:
          - 3306:3306
        # Wait for the server to accept connections before the steps run.
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -prudder"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # MYSQL_TEST_URL is declared in turbo.json's test `env`, so strict env mode
      # passes it through AND it's part of the cache key. `--force` stays as a
      # belt-and-braces guard; turbo builds the workspace deps first via `^build`.
      - name: ORM tests against live MySQL
        env:
          MYSQL_TEST_URL: mysql://root:rudder@127.0.0.1:3306/rudder_native_mysql_test
        run: pnpm turbo run test --filter @rudderjs/orm --filter @rudderjs/database --filter @rudderjs/orm-drizzle --filter @rudderjs/orm-prisma --force

  docs-build:
    # Runs on EVERY PR (no `if:`), code or docs. The VitePress build is the
    # only place that catches `.md` parser breakage (plan docs landing
    # `Promise<T>` or `<5%` patterns) at PR time before the release workflow
    # hits the same bug post-merge.
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm --filter @rudderjs/docs build

  scaffolder-e2e:
    # Mirrors the user-facing recipes in `create-rudder/src/cli-flags.ts`:
    # every cell here is a profile a real user can pick at `pnpm create
    # rudder-app`. The matrix is react-heavy (all 5 recipes × react) +
    # narrow on vue/solid (only web-app, since minimal/api-service are
    # no-frontend and the framework override is ignored for `frameworks: []`).
    # The flow-check (register → home → sign-out) runs only on
    # react × web-app (smoke gates internally).
    #
    # Package manager axis: pnpm is the per-recipe baseline; +1 cell covers
    # `npm` for the canonical react × web-app shape (catches PM-specific
    # install/exec/script regressions). yarn classic has a known hoister bug
    # with vike+vite (see feedback_yarn1_vike_hoist_bug); yarn berry coverage
    # is a follow-up.
    name: Scaffolder E2E (${{ matrix.framework }} / ${{ matrix.profile }} / ${{ matrix.via }} / ${{ matrix.pm }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Only the native-pg cell talks to it, but GitHub services can't be gated
    # per matrix cell — the container is small and starts in seconds, so every
    # cell carries it. Stock postgres (no pgvector — the scaffold runs plain DDL).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rudder
          POSTGRES_PASSWORD: rudder
          POSTGRES_DB: rudder_scaffold_pg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          # React — every recipe (direct: getTemplates() → write files).
          - { framework: react, profile: minimal,     via: direct, pm: pnpm }
          - { framework: react, profile: web-app,     via: direct, pm: pnpm }
          - { framework: react, profile: saas,        via: direct, pm: pnpm }
          - { framework: react, profile: api-service, via: direct, pm: pnpm }
          - { framework: react, profile: realtime,    via: direct, pm: pnpm }
          # Native engine — the scaffolder's default data layer. sqlite is the
          # zero-setup default; native-pg exercises the 7.9 pg scaffold
          # (config driver names, postgres driver dep, `rudder migrate` DDL
          # over the wire) against the job's postgres service.
          - { framework: react, profile: native,      via: direct, pm: pnpm }
          - { framework: react, profile: native-pg,   via: direct, pm: pnpm }
          # Vue / Solid — web-app only. minimal + api-service ignore the
          # framework axis (no-frontend → vanilla welcome shell shared across).
          - { framework: vue,   profile: web-app,     via: direct, pm: pnpm }
          - { framework: solid, profile: web-app,     via: direct, pm: pnpm }
          # CLI entrypoint smoke — spawns `create-rudder` in JSON mode to
          # exercise parseFlags → validateJsonMode → resolveJsonAnswers →
          # scaffold end-to-end. One cell covers the path that real users
          # hit; the 7 above keep per-recipe template correctness coverage.
          - { framework: react, profile: web-app,     via: cli,    pm: pnpm }
          # Package-manager axis — npm gets the canonical recipe via the
          # packed-tarball linking path. Catches PM-specific install / exec /
          # script regressions a pnpm-only matrix misses.
          - { framework: react, profile: web-app,     via: direct, pm: npm  }

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Playwright version
        id: playwright
        # Keyed-by-version cache below: chromium binary churns when the
        # devDep version bumps. The shell parse keeps the workflow source
        # of truth in package.json instead of a duplicate string here.
        run: |
          version=$(node -p "require('./create-rudder/package.json').devDependencies.playwright.replace(/^[^0-9]*/, '')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        # Skip the ~150MB browser download on cache hit. --with-deps still runs
        # so system libs land even when binaries were cached.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter create-rudder exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter create-rudder exec playwright install-deps chromium

      - name: Build packages + scaffolder
        run: pnpm turbo run build --filter='./packages/*' --filter='./create-rudder'

      - name: Scaffold + boot + render-check
        env:
          # Consumed only by the native-pg profile (smoke.ts rewrites the
          # scaffolded .env's DATABASE_URL with it); ignored by every other cell.
          PG_TEST_URL: postgres://rudder:rudder@localhost:5432/rudder_scaffold_pg_test
        run: pnpm --filter create-rudder smoke --framework=${{ matrix.framework }} --profile=${{ matrix.profile }} --via=${{ matrix.via }} --pm=${{ matrix.pm }}

  rsc-e2e:
    # React Server Components (vike-react-rsc-rudder) is an opt-in renderer:
    # a RudderJS-maintained fork of upstream vike-react-rsc + vike version-compat
    # shims (see packages/vike-react-rsc/README.md). It's fragile to vike /
    # @vitejs/plugin-rsc bumps and to an upstream re-sync, so this gate builds
    # `playground-rsc` for PRODUCTION and drives a
    # headless browser through the SSR render + the `"use server"` action
    # round-trip. A red here means a dep bump or a scanner/server-hono change
    # broke RSC — caught in CI instead of in a user's app. (playground-rsc is not
    # in the build-test matrix's build filter, so this is its only CI coverage.)
    name: RSC E2E
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Playwright version
        id: playwright
        # Same cache key shape as scaffolder-e2e — both pin playwright 1.x, so
        # the chromium binary is shared across both jobs.
        run: |
          version=$(node -p "require('./playground-rsc/package.json').devDependencies.playwright.replace(/^[^0-9]*/, '')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter rudderjs-playground-rsc exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter rudderjs-playground-rsc exec playwright install-deps chromium

      - name: Build packages + playground-rsc (production)
        run: pnpm turbo run build --filter='./packages/*' --filter='rudderjs-playground-rsc'

      - name: RSC render + action E2E (production)
        run: pnpm --filter rudderjs-playground-rsc test:e2e

  playground-build:
    # Full production build — the SAME unfiltered `pnpm build` the Release
    # workflow runs, at PR time. The build-test matrix filters to
    # `./packages/* + create-rudder*` and NEVER builds the playgrounds, so
    # `vike build` (and its prerender pass) only ran in Release — post-merge,
    # too late. That gap let a Vite 8 / rolldown prerender regression reach main
    # (Vike left `__VITE_ASSETS_MANIFEST__` unreplaced in a server chunk on
    # Linux → `ReferenceError` during prerender; fixed in
    # patches/vike@0.4.257.patch).
    #
    # MUST mirror Release exactly (full concurrent build, not a targeted
    # playground filter): rolldown's chunk split is sensitive to the full build
    # graph, and a narrower build can replace the placeholder in a chunk the
    # full build leaks elsewhere — a targeted gate gave a false green once while
    # Release stayed red. `--force` guarantees execution (no turbo cache mask).
    name: Playground Build (production)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build everything (mirror Release, uncached)
        run: pnpm turbo run build --force

      - name: Assert manifest placeholder fully replaced
        # Belt-and-suspenders beyond the build crashing on prerender: catches a
        # leaked __VITE_ASSETS_MANIFEST__ even in a server bundle that isn't
        # executed at prerender time (an app with no prerendered pages still
        # emits the broken chunk).
        run: |
          if grep -rl '__VITE_ASSETS_MANIFEST__' playground/dist/server playground-prisma/dist/server playground-web/dist/server 2>/dev/null; then
            echo "::error::Vike left __VITE_ASSETS_MANIFEST__ unreplaced in a server chunk (Vite 8 / rolldown — see patches/vike@0.4.257.patch)"
            exit 1
          fi
          echo "OK: no unreplaced __VITE_ASSETS_MANIFEST__ in server output"
