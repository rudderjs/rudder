# Consolidated CI workflow.
#
# Previously the repo had ci.yml + ci-skip.yml — two workflows sharing the
# same `name: CI` and identical job names, with mutually-exclusive `paths` /
# `paths-ignore` filters meant to keep branch-protection check names firing
# on docs-only PRs without running the full pipeline. The filter pair
# wasn't truly exclusive though: any PR mixing code + markdown (every PR
# with a changeset) tripped BOTH workflows, doubling CI minutes.
#
# This file collapses them into one. The workflow always triggers on
# main/PR; a leading `changes` job detects whether any non-docs file
# changed, and heavy jobs (lint, build-test matrix, scaffolder-e2e) skip
# themselves on docs-only PRs via job-level `if:`. GitHub treats a skipped
# required check as a passing check for branch protection, so docs-only PRs
# stay mergeable without a parallel mirror workflow.
#
# Adding a new required check: add the job + an `if:` referencing
# `needs.changes.outputs.code`. Don't introduce a second workflow file.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every job here only checks out, installs, builds, and tests — none push,
# comment, or write. Pin the GITHUB_TOKEN to least privilege at the workflow
# level (applies to all jobs); raise per-job only if a future job needs more.
permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          # `code` is true when ANY changed file is NOT in the docs/meta
          # set. Inverse-match (`!`) lets paths-filter express the
          # "non-docs touched" predicate that `paths-ignore` couldn't.
          filters: |
            code:
              - '!**/*.md'
              - '!**/*.mdx'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/CODEOWNERS'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  build-test:
    name: Build & Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    # 40 (was 20) to leave headroom for the Windows per-attempt-timeout retry to
    # self-heal a hung build/test attempt (kill at 8m → back off → retry) without
    # the job-level timeout cancelling mid-recovery. A genuine hang still fails
    # red deterministically at ~26m (3 × 8m + backoff); healthy runs are ~6m.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-

      # ── Windows-only build-flake mitigation (layered) ────────────────────
      # `Build & Test (windows-latest)` has TWO distinct intermittent failure
      # modes (don't conflate them — that's why earlier single-cause fixes kept
      # recurring):
      #
      #   A. CRASH — a spawned `tsc` / `node --test` exits -1073741502 ==
      #      0xC0000142 == STATUS_DLL_INIT_FAILED: the process dies during DLL
      #      init under Windows desktop-heap exhaustion (many process spawns).
      #      Fails FAST (a few minutes), non-zero exit.
      #   B. HANG — a spawned process instead WEDGES and never returns. The job
      #      ran to its timeout and was cancelled (~25m). (NOT the turbo daemon:
      #      turbo 2.x doesn't use it for `turbo run`.) Root cause unconfirmed —
      #      a wedged build/test process under the same pressure.
      #
      # Both never reproduce on Linux/macOS and clear on re-run. Defences:
      #   1. Add-MpPreference exclusion — Defender scanning a DLL mid-load can
      #      aggravate the init failure. Best-effort; never fails CI.
      #   2. TURBO_CONCURRENCY=1 — serialise so only one process spawns at a time
      #      (#784). Default on Linux. Cuts the crash rate, but not to zero.
      #   3. TURBO_LOG_ORDER=stream — keep failures attributable, not swallowed.
      #   4. Bounded retry WITH BACKOFF (#792 + #798) — handles mode A: a retry
      #      replays turbo's cache and re-spawns only the crashed package in ~ms,
      #      hitting the still-exhausted desktop heap, so an INSTANT retry fails
      #      3x in ~70ms; sleeping 30s/60s lets the OS reclaim handles first.
      #   5. PER-ATTEMPT TIMEOUT — handles mode B, which #4 is structurally blind
      #      to: the retry only inspects the exit code, so a process that never
      #      exits just blocks the loop until the job timeout. Each attempt now
      #      runs in a child pwsh we kill (whole tree) if it exceeds 8m (healthy
      #      is ~3m), turning a 25m cancel into kill→backoff→retry. On timeout we
      #      dump the live node/pnpm/turbo/tsc processes so the next hang is
      #      finally diagnosable instead of opaque.
      #
      # A REAL failure (crash or hang) is deterministic — fails all 3 attempts
      # and still goes red — so the retry can't mask a true break.
      - name: Exclude workspace from Windows Defender
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction Stop
            Write-Host "Defender exclusion added for ${{ github.workspace }}"
          } catch {
            Write-Host "::warning::Could not add Defender exclusion (continuing): $_"
          }

      # Linux/macOS: plain steps, no retry — the flake never reproduces here.
      - name: Build
        if: matrix.os != 'windows-latest'
        run: pnpm turbo run build --filter='./packages/*' --filter='./create-rudder-app' --filter='./create-rudder'

      - name: Test
        if: matrix.os != 'windows-latest'
        run: pnpm turbo run test --filter='./packages/*' --filter='./create-rudder-app' --filter='./create-rudder'

      # Windows: serialise + stream + retry up to 3x, with a PER-ATTEMPT TIMEOUT.
      # Each attempt runs the turbo command in a child pwsh we wait on with a
      # deadline (WaitForExit) and kill (whole process tree) if it wedges — so a
      # crash (mode A, fast non-zero exit) AND a hang (mode B, no exit) both route
      # into the same backoff+retry. On timeout we dump the live build processes
      # for diagnostics. A real failure fails all 3 attempts and still goes red.
      # (Inlined per step rather than shared — self-contained plain pwsh is easier
      # to read and reason about than an interpolated function.)
      - name: Build (windows — retry + per-attempt timeout for the DLL crash/hang flakes)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          TURBO_LOG_ORDER: stream
          TURBO_CONCURRENCY: '1'
        run: |
          $max = 3
          $attemptTimeoutSec = 480   # 8m; healthy build is ~3m
          foreach ($i in 1..$max) {
            # Run the attempt in a child pwsh so we can enforce a deadline and
            # kill a wedged process tree. The command line matches the Linux step.
            $p = Start-Process pwsh -NoNewWindow -PassThru -ArgumentList @(
              '-NoProfile','-Command',
              "pnpm turbo run build --filter='./packages/*' --filter='./create-rudder-app' --filter='./create-rudder'; exit `$LASTEXITCODE"
            )
            $null = $p.Handle   # cache the handle so $p.ExitCode is readable after exit (pwsh Start-Process gotcha)
            if ($p.WaitForExit($attemptTimeoutSec * 1000)) {
              $code = $p.ExitCode
            } else {
              Write-Host "::warning::Build attempt $i/$max exceeded ${attemptTimeoutSec}s — a process wedged (hang flake, mode B). Live build processes:"
              Get-Process | Where-Object { $_.ProcessName -match 'node|pnpm|turbo|tsc|esbuild' } |
                Select-Object Id, ProcessName, @{ n = 'RSS_MB'; e = { [int]($_.WorkingSet64 / 1MB) } } |
                Format-Table -AutoSize | Out-String | Write-Host
              try { $p.Kill($true) } catch { Write-Host "::warning::could not kill the hung tree: $_" }
              $p.WaitForExit(15000) | Out-Null
              $code = 124   # conventional timeout exit code
            }
            if ($code -eq 0) { exit 0 }
            if ($i -lt $max) {
              $delay = 30 * $i   # 30s, then 60s — let the OS reclaim handles (mode A)
              Write-Host "::warning::Build attempt $i/$max failed (exit $code) — waiting ${delay}s, then retrying"
              Start-Sleep -Seconds $delay
            }
          }
          Write-Host "::error::Build failed after $max attempts"
          exit 1

      - name: Test (windows — retry + per-attempt timeout for the DLL crash/hang flakes)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          TURBO_LOG_ORDER: stream
          TURBO_CONCURRENCY: '1'
        run: |
          $max = 3
          $attemptTimeoutSec = 480   # 8m; healthy test is ~3m
          foreach ($i in 1..$max) {
            $p = Start-Process pwsh -NoNewWindow -PassThru -ArgumentList @(
              '-NoProfile','-Command',
              "pnpm turbo run test --filter='./packages/*' --filter='./create-rudder-app' --filter='./create-rudder'; exit `$LASTEXITCODE"
            )
            $null = $p.Handle   # cache the handle so $p.ExitCode is readable after exit (pwsh Start-Process gotcha)
            if ($p.WaitForExit($attemptTimeoutSec * 1000)) {
              $code = $p.ExitCode
            } else {
              Write-Host "::warning::Test attempt $i/$max exceeded ${attemptTimeoutSec}s — a process wedged (hang flake, mode B). Live test processes:"
              Get-Process | Where-Object { $_.ProcessName -match 'node|pnpm|turbo|tsc|esbuild' } |
                Select-Object Id, ProcessName, @{ n = 'RSS_MB'; e = { [int]($_.WorkingSet64 / 1MB) } } |
                Format-Table -AutoSize | Out-String | Write-Host
              try { $p.Kill($true) } catch { Write-Host "::warning::could not kill the hung tree: $_" }
              $p.WaitForExit(15000) | Out-Null
              $code = 124
            }
            if ($code -eq 0) { exit 0 }
            if ($i -lt $max) {
              $delay = 30 * $i
              Write-Host "::warning::Test attempt $i/$max failed (exit $code) — waiting ${delay}s, then retrying"
              Start-Sleep -Seconds $delay
            }
          }
          Write-Host "::error::Test failed after $max attempts"
          exit 1

  client-bundle:
    # Client-bundle smoke gate: some @rudderjs/* packages are legitimately
    # bundled into the BROWSER (a `Model` reachable from client code, `app`/`Env`
    # from a shared module). They must evaluate without pulling Node at module
    # eval — no top-level `process.env`, no static `node:` import in the graph.
    # Catches the orm 1.12.4 regression (`process is not defined`) and the
    # @rudderjs/core console/@clack re-export hostility. See
    # scripts/client-bundle-smoke.mjs.
    name: Client Bundle Smoke
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Client-bundle smoke
        run: pnpm test:client-bundle

  orm-standalone:
    # Standalone-Node certification: pack @rudderjs/orm the way npm ships it and
    # install it into a throwaway project OUTSIDE the workspace with NO Rudder
    # framework — proving it works as a plain library AND that no framework dep
    # (@rudderjs/console / @rudderjs/core) creeps into the install. The in-repo
    # conformance suite can't catch this — it runs where every @rudderjs/* package
    # is workspace-linked, so it never exercises the published exports map or the
    # real dependency graph. See scripts/orm-standalone-smoke.mjs.
    name: ORM Standalone Smoke
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Standalone install + round-trip
        run: node scripts/orm-standalone-smoke.mjs

  docs-build:
    # Runs on EVERY PR (no `if:`), code or docs. The VitePress build is the
    # only place that catches `.md` parser breakage (plan docs landing
    # `Promise<T>` or `<5%` patterns) at PR time before the release workflow
    # hits the same bug post-merge.
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm --filter @rudderjs/docs build

  scaffolder-e2e:
    # Mirrors the user-facing recipes in `create-rudder/src/cli-flags.ts`:
    # every cell here is a profile a real user can pick at `pnpm create
    # rudder-app`. The matrix is react-heavy (all 5 recipes × react) +
    # narrow on vue/solid (only web-app, since minimal/api-service are
    # no-frontend and the framework override is ignored for `frameworks: []`).
    # The flow-check (register → home → sign-out) runs only on
    # react × web-app (smoke gates internally).
    #
    # Package manager axis: pnpm is the per-recipe baseline; +1 cell covers
    # `npm` for the canonical react × web-app shape (catches PM-specific
    # install/exec/script regressions). yarn classic has a known hoister bug
    # with vike+vite (see feedback_yarn1_vike_hoist_bug); yarn berry coverage
    # is a follow-up.
    name: Scaffolder E2E (${{ matrix.framework }} / ${{ matrix.profile }} / ${{ matrix.via }} / ${{ matrix.pm }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # React — every recipe (direct: getTemplates() → write files).
          - { framework: react, profile: minimal,     via: direct, pm: pnpm }
          - { framework: react, profile: web-app,     via: direct, pm: pnpm }
          - { framework: react, profile: saas,        via: direct, pm: pnpm }
          - { framework: react, profile: api-service, via: direct, pm: pnpm }
          - { framework: react, profile: realtime,    via: direct, pm: pnpm }
          # Vue / Solid — web-app only. minimal + api-service ignore the
          # framework axis (no-frontend → vanilla welcome shell shared across).
          - { framework: vue,   profile: web-app,     via: direct, pm: pnpm }
          - { framework: solid, profile: web-app,     via: direct, pm: pnpm }
          # CLI entrypoint smoke — spawns `create-rudder` in JSON mode to
          # exercise parseFlags → validateJsonMode → resolveJsonAnswers →
          # scaffold end-to-end. One cell covers the path that real users
          # hit; the 7 above keep per-recipe template correctness coverage.
          - { framework: react, profile: web-app,     via: cli,    pm: pnpm }
          # Package-manager axis — npm gets the canonical recipe via the
          # packed-tarball linking path. Catches PM-specific install / exec /
          # script regressions a pnpm-only matrix misses.
          - { framework: react, profile: web-app,     via: direct, pm: npm  }

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Playwright version
        id: playwright
        # Keyed-by-version cache below: chromium binary churns when the
        # devDep version bumps. The shell parse keeps the workflow source
        # of truth in package.json instead of a duplicate string here.
        run: |
          version=$(node -p "require('./create-rudder/package.json').devDependencies.playwright.replace(/^[^0-9]*/, '')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        # Skip the ~150MB browser download on cache hit. --with-deps still runs
        # so system libs land even when binaries were cached.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter create-rudder exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter create-rudder exec playwright install-deps chromium

      - name: Build packages + scaffolder
        run: pnpm turbo run build --filter='./packages/*' --filter='./create-rudder'

      - name: Scaffold + boot + render-check
        run: pnpm --filter create-rudder smoke --framework=${{ matrix.framework }} --profile=${{ matrix.profile }} --via=${{ matrix.via }} --pm=${{ matrix.pm }}

  rsc-e2e:
    # React Server Components (vike-react-rsc-rudder) is an opt-in renderer:
    # a RudderJS-maintained fork of upstream vike-react-rsc + vike version-compat
    # shims (see packages/vike-react-rsc/README.md). It's fragile to vike /
    # @vitejs/plugin-rsc bumps and to an upstream re-sync, so this gate builds
    # `playground-rsc` for PRODUCTION and drives a
    # headless browser through the SSR render + the `"use server"` action
    # round-trip. A red here means a dep bump or a scanner/server-hono change
    # broke RSC — caught in CI instead of in a user's app. (playground-rsc is not
    # in the build-test matrix's build filter, so this is its only CI coverage.)
    name: RSC E2E
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Playwright version
        id: playwright
        # Same cache key shape as scaffolder-e2e — both pin playwright 1.x, so
        # the chromium binary is shared across both jobs.
        run: |
          version=$(node -p "require('./playground-rsc/package.json').devDependencies.playwright.replace(/^[^0-9]*/, '')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter rudderjs-playground-rsc exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter rudderjs-playground-rsc exec playwright install-deps chromium

      - name: Build packages + playground-rsc (production)
        run: pnpm turbo run build --filter='./packages/*' --filter='rudderjs-playground-rsc'

      - name: RSC render + action E2E (production)
        run: pnpm --filter rudderjs-playground-rsc test:e2e

  playground-build:
    # Full production build — the SAME unfiltered `pnpm build` the Release
    # workflow runs, at PR time. The build-test matrix filters to
    # `./packages/* + create-rudder*` and NEVER builds the playgrounds, so
    # `vike build` (and its prerender pass) only ran in Release — post-merge,
    # too late. That gap let a Vite 8 / rolldown prerender regression reach main
    # (Vike left `__VITE_ASSETS_MANIFEST__` unreplaced in a server chunk on
    # Linux → `ReferenceError` during prerender; fixed in
    # patches/vike@0.4.257.patch).
    #
    # MUST mirror Release exactly (full concurrent build, not a targeted
    # playground filter): rolldown's chunk split is sensitive to the full build
    # graph, and a narrower build can replace the placeholder in a chunk the
    # full build leaks elsewhere — a targeted gate gave a false green once while
    # Release stayed red. `--force` guarantees execution (no turbo cache mask).
    name: Playground Build (production)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build everything (mirror Release, uncached)
        run: pnpm turbo run build --force

      - name: Assert manifest placeholder fully replaced
        # Belt-and-suspenders beyond the build crashing on prerender: catches a
        # leaked __VITE_ASSETS_MANIFEST__ even in a server bundle that isn't
        # executed at prerender time (an app with no prerendered pages still
        # emits the broken chunk).
        run: |
          if grep -rl '__VITE_ASSETS_MANIFEST__' playground/dist/server playground-web/dist/server 2>/dev/null; then
