name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/CODEOWNERS'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  build-test:
    name: Build & Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Build
        run: pnpm turbo run build --filter='./packages/*' --filter='./create-rudder-app'

      - name: Test
        run: pnpm turbo run test --filter='./packages/*' --filter='./create-rudder-app'

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        # Docs build catches VitePress/Vue-parser breakage in `.md` files
        # (plan docs accidentally landing `Promise<T>` or `<5%` patterns, etc.).
        # The release workflow runs this as part of `pnpm build` and used to
        # be the first place such breakage surfaced — now it's caught at PR time.
        # Pulled out of build-test so it doesn't run 4× per matrix cell.
        run: pnpm --filter @rudderjs/docs build

  scaffolder-e2e:
    # Phases 0-3 of docs/plans/2026-05-19-scaffolder-render-e2e.md + Phase 2 of
    # docs/plans/2026-05-18-ci-portability-matrix.md.
    # Scaffolds a real app via create-rudder-app, links every @rudderjs/* to
    # the local workspace, installs, runs prisma + rudder boot commands,
    # builds + boots the prod server, then drives a headless chromium across
    # the profile route manifest (Welcome + auth UI + selected demos + admin
    # dashboards) to catch hydration/console-error regressions the SSR-only
    # smoke can't see. Framework matrix (react/vue/solid) catches vike-react/
    # vue/solid renderer drift; profile matrix (minimal/default/demos-all)
    # catches package-induced route drift. The smoke drops demos for
    # non-react and the manifest gates auth UI to react, so vue/solid cells
    # exercise the kitchen-sink package set without untestable views.
    # Ubuntu + Node 22 only; cross-OS is the previous plan doc's Phase 3 and
    # stays deferred.
    name: Scaffolder E2E (${{ matrix.framework }} / ${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, solid]
        profile:   [minimal, default, demos-all]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Playwright version
        id: playwright
        # Keyed-by-version cache below: chromium binary churns when the
        # devDep version bumps. The shell parse keeps the workflow source
        # of truth in package.json instead of a duplicate string here.
        run: |
          version=$(node -p "require('./create-rudder-app/package.json').devDependencies.playwright.replace(/^[^0-9]*/, '')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        # Skip the ~150MB browser download on cache hit. --with-deps still runs
        # so system libs land even when binaries were cached.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter create-rudder-app exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter create-rudder-app exec playwright install-deps chromium

      - name: Build packages + scaffolder
        run: pnpm turbo run build --filter='./packages/*' --filter='./create-rudder-app'

      - name: Scaffold + boot + render-check
        run: pnpm --filter create-rudder-app smoke --framework=${{ matrix.framework }} --profile=${{ matrix.profile }}
