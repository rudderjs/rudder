name: Docs sync dispatch

# When a main merge changes user-facing docs, ping rudderjs.com to mirror them.
# The site's docs-sync workflow does the actual sync + opens a PR (the deploy
# gate). This is just the trigger — the site also runs a daily fallback, so if
# SITE_DISPATCH_TOKEN is ever missing this degrades to "synced within a day"
# rather than breaking.
#
# Requires repo secret SITE_DISPATCH_TOKEN: a fine-grained PAT scoped to
# rudderjs/rudderjs.com with Contents: Read and write (needed to create a
# repository_dispatch event). The default GITHUB_TOKEN cannot dispatch to
# another repository.

on:
  push:
    branches: [main]
    paths:
      - 'docs/guide/**'
      - 'docs/packages/**'
      - 'docs/cli/**'
      - 'docs/integrations/**'
      - 'docs/contributing/**'

permissions:
  contents: read

jobs:
  dispatch:
    name: Ping rudderjs.com
    runs-on: ubuntu-latest
    steps:
      # Secrets can't be referenced in step-level `if:`, so probe the token in a
      # run step first. When it's absent (not configured yet, or expired), skip
      # the dispatch and pass green — the site's daily docs-sync schedule still
      # mirrors the change. This keeps a docs merge from failing red on a
      # missing secret while preserving the immediate trigger once it's set.
      - name: Check for dispatch token
        id: token
        env:
          SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -n "$SITE_DISPATCH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SITE_DISPATCH_TOKEN is not set — skipping the immediate dispatch. rudderjs.com's daily docs-sync schedule will still mirror this change. Set the secret to enable the immediate trigger."
          fi

      - name: Send docs-sync repository_dispatch
        if: steps.token.outputs.present == 'true'
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.SITE_DISPATCH_TOKEN }}
          repository: rudderjs/rudderjs.com
          event-type: docs-sync
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref_name }}"
            }
