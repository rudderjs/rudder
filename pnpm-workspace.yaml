packages:
  - packages/*
  - tests/*
  - create-rudder-app
  - create-rudder
  - playground
  - playground-prisma
  - playground-web
  - playground-rsc
  - docs
  - benchmarks

# pnpm 11 prompts before purging node_modules on a store-version change;
# disable so non-TTY installs (CI, scripts) don't abort with ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY.
confirmModulesPurge: false

allowBuilds:
  '@prisma/engines': true
  prisma: true
  msgpackr-extract: true
  protobufjs: true
  better-sqlite3: true
  sharp: true
  argon2: false
  esbuild: false
  leveldown: false
  msw: false
  rolldown: false

overrides:
  tsdown>rolldown: 1.0.0-beta.8
  vike: 0.4.257
  '@types/node': 20.19.35
  hono: ^4.12.4
  protobufjs@7: ^7.6.1
  protobufjs@8: ^8.4.2
  '@google/genai>ws': ^8.21.0
  express>qs: ^6.15.2
  postcss: ^8.5.10
  defu: ^6.1.5
  lodash: ^4.18.0
  effect: ^3.20.0
  diff: ^8.0.3
  '@hono/node-server': ^1.19.14
  valibot: ^1.2.0

patchedDependencies:
  '@brillout/vite-plugin-server-entry@0.7.18': patches/@brillout__vite-plugin-server-entry@0.7.18.patch
  vike@0.4.257: patches/vike@0.4.257.patch
