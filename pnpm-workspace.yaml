packages:
  - packages/*
  - tests/*
  - create-rudder
  - playground
  - playground-prisma
  - playground-web
  - playground-rsc
  - docs
  - benchmarks

# pnpm 11 prompts before purging node_modules on a store-version change;
# disable so non-TTY installs (CI, scripts) don't abort with ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY.
confirmModulesPurge: false

allowBuilds:
  '@prisma/engines': true
  prisma: true
  msgpackr-extract: true
  protobufjs: true
  better-sqlite3: true
  sharp: true
  argon2: false
  esbuild: false
  leveldown: false
  msw: false
  rolldown: false

overrides:
  # GHSA esbuild Deno-RCE + Windows dev-server file-read, fixed in 0.28.1.
  # Force the transitive copies under tsx/vite (which pin ~0.27) up too.
  esbuild: ^0.28.1
  tsdown>rolldown: 1.0.0-beta.8
  vike: 0.4.257
  # vike pins this exactly to 0.7.18; 0.7.19 ships the upstream prefix-guard fix
  # (isServerEntryOutsideOfCwd) that we previously carried as a local patch.
  '@brillout/vite-plugin-server-entry': 0.7.19
  '@types/node': 20.19.35
  # GHSA: CORS wildcard-with-credentials (high) + 4 medium, fixed in 4.12.25.
  hono: ^4.12.25
  protobufjs@7: ^7.6.3
  protobufjs@8: ^8.4.2
  # GHSA: vite `server.fs.deny` bypass on Windows (high) + launch-editor NTLM
  # disclosure, fixed in 7.3.5 / 8.0.16. Scoped per-major: the 7.x copy under
  # @rudderjs/docs and the 8.x copy the framework runs both clear.
  vite@7: ^7.3.5
  vite@8: ^8.0.16
  # GHSA: form-data CRLF injection (high), fixed in 4.0.6.
  form-data: ^4.0.6
  # GHSA: OTel core unbounded W3C Baggage allocation, fixed in 2.8.0.
  '@opentelemetry/core': ^2.8.0
  # GHSA: js-yaml quadratic-complexity DoS in merge-key handling, fixed in 4.2.0.
  js-yaml@4: ^4.2.0
  # GHSA: @babel/core arbitrary file read via sourceMappingURL, fixed in 7.29.6.
  '@babel/core': ^7.29.6
  '@google/genai>ws': ^8.21.0
  express>qs: ^6.15.2
  postcss: ^8.5.10
  defu: ^6.1.5
  lodash: ^4.18.0
  effect: ^3.20.0
  diff: ^8.0.3
  '@hono/node-server': ^1.19.14
  valibot: ^1.2.0

patchedDependencies:
  vike@0.4.257: patches/vike@0.4.257.patch

minimumReleaseAgeExclude:
  - '@brillout/vite-plugin-server-entry@0.7.19'
